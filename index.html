<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atul Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #111;
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
    }

    .robot {
      font-size: 55px;
      margin-bottom: 10px;
    }

    .wave {
      font-size: 28px;
      display: inline-block;
      animation: wave 1.5s infinite;
      margin-left: 8px;
    }

    @keyframes wave {
      0% { transform: rotate(0deg); }
      15% { transform: rotate(14deg); }
      30% { transform: rotate(-8deg); }
      40% { transform: rotate(14deg); }
      50% { transform: rotate(-4deg); }
      60% { transform: rotate(10deg); }
      100% { transform: rotate(0deg); }
    }

    h1 {
      font-size: 34px;
      color: cyan;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 20px;
      color: #ffcc00;
      margin-bottom: 18px;
    }

    p {
      font-size: 16px;
      color: #ddd;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: cyan;
      color: black;
      padding: 12px 22px;
      margin: 8px;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00bcd4;
    }

    .section {
      margin-top: 30px;
      text-align: left;
    }

    .section h3 {
      color: #00ffff;
      margin-bottom: 12px;
      text-align: center;
      font-size: 24px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border-left: 4px solid cyan;
    }

    .card strong {
      color: #ffcc00;
    }

    footer {
      margin-top: 30px;
      color: #888;
      font-size: 14px;
    }

    a {
      color: inherit;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="robot">👨🏻‍💻🤖<span class="wave">👋🏻</span></div>

    <h1>Hi! I'm ATUL PATEL</h1>
    <h2>Beginner Web Developer</h2>

    <p>
      My goal is to become a smart and creative web developer who builds modern,
      attractive, and user-friendly websites.
    </p>
